name: Profile Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: profile-automation
  cancel-in-progress: false

jobs:
  refresh-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Ensure assets directory exists
        run: mkdir -p assets

      - name: Update README timestamp
        run: |
          stamp="$(date -u '+%Y-%m-%d %H:%M UTC')"
          sed -i -E "s#(<!--LAST_UPDATED_START-->).*(<!--LAST_UPDATED_END-->)#\\1${stamp}\\2#" README.md

      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: kaikybrofc
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: assets/snake.svg?palette=github-dark

      - name: Generate metrics (base)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: kaikybrofc
          filename: assets/metrics.base.svg
          template: classic
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_timezone: America/Manaus
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C

      - name: Generate metrics (extended)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: kaikybrofc
          filename: assets/metrics.extended.svg
          template: classic
          base: repositories, metadata
          config_timezone: America/Manaus
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_stars: yes
          plugin_stars_limit: 4

      - name: Commit and push changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            # Keep local branch up to date before creating the commit.
            if ! git pull --rebase --autostash origin main; then
              echo "Failed to sync with origin/main before commit."
              exit 1
            fi

            git add README.md assets/*.svg

            if git diff --cached --quiet; then
              echo "No profile changes detected after sync."
              exit 0
            fi

            git commit -m "chore(profile): refresh metrics and visuals"

            for attempt in 1 2 3; do
              if git push origin HEAD:main; then
                echo "Push succeeded on attempt ${attempt}."
                break
              fi

              if [[ "${attempt}" == "3" ]]; then
                echo "Push failed after ${attempt} attempts."
                exit 1
              fi

              echo "Push rejected (attempt ${attempt}); rebasing and retrying..."
              if ! git pull --rebase origin main; then
                echo "Rebase failed while preparing retry."
                git rebase --abort || true
                exit 1
              fi
              sleep 5
            done
          else
            echo "No profile changes detected."
          fi
