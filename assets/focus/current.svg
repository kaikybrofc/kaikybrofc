<svg width="1400" height="374" viewBox="0 0 1400 374" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Resumo dinamico da secao Foco Atual">
  <defs>
    <linearGradient id="bgFocus" x1="0" y1="0" x2="1400" y2="374" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#040919"/>
      <stop offset="0.58" stop-color="#061328"/>
      <stop offset="1" stop-color="#081b33"/>
    </linearGradient>
    <linearGradient id="accentFocus" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#ff2bd6"/>
    </linearGradient>
    <pattern id="gridFocus" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="#38bdf8" stroke-opacity="0.15" stroke-width="1"/>
      <animateTransform attributeName="patternTransform" type="translate" dur="16s" repeatCount="indefinite" values="0 0;24 24;0 0"/>
    </pattern>
  </defs>
  <rect width="1400" height="374" rx="18" fill="url(#bgFocus)"/>
  <rect width="1400" height="374" rx="18" fill="url(#gridFocus)"/>
  <rect x="36" y="28" width="1328" height="318" rx="14" fill="#020617" fill-opacity="0.52" stroke="#38bdf8" stroke-opacity="0.28"/>
  <rect x="52" y="48" width="300" height="34" rx="8" fill="#0b1221" stroke="#22d3ee" stroke-opacity="0.5"/>
  <text x="68" y="71" fill="#bff6ff" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="700">FOCO ATUAL</text>
  <line x1="52" y1="92" x2="1348" y2="92" stroke="url(#accentFocus)" stroke-width="2" stroke-opacity="0.8"/>
  <text x="54" y="118" fill="#d9f4ff" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="600">• Otimização de sistemas de mensageria com foco em persistência de credenciais e</text>
<text x="54" y="150" fill="#d9f4ff" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="600">  estabilidade de conexões via MariaDB e Redis.</text>
<text x="54" y="182" fill="#d9f4ff" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="600">• Refinamento de fluxos de automação de perfil e manutenção programada de ativos SVG para</text>
<text x="54" y="214" fill="#d9f4ff" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="600">  métricas dinâmicas de repositórios.</text>
<text x="54" y="246" fill="#d9f4ff" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="600">• Evolução de ferramentas de integração de IA, priorizando a configuração do Gemini CLI e o</text>
<text x="54" y="278" fill="#d9f4ff" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="600">  monitoramento de conteúdo automatizado.</text>
  <line x1="52" y1="330" x2="1348" y2="330" stroke="#38bdf8" stroke-opacity="0.32"/>
  <text x="54" y="354" fill="#a8d9f4" font-family="JetBrains Mono, Consolas, monospace" font-size="16">
    atualizado: 58m
  </text>
</svg>