<svg width="1400" height="386" viewBox="0 0 1400 386" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Resumo dinamico da secao Sobre">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="386" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#040919"/>
      <stop offset="0.58" stop-color="#061328"/>
      <stop offset="1" stop-color="#081b33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#ff2bd6"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="#38bdf8" stroke-opacity="0.15" stroke-width="1"/>
      <animateTransform attributeName="patternTransform" type="translate" dur="16s" repeatCount="indefinite" values="0 0;24 24;0 0"/>
    </pattern>
  </defs>
  <rect width="1400" height="386" rx="18" fill="url(#bg)"/>
  <rect width="1400" height="386" rx="18" fill="url(#grid)"/>
  <rect x="36" y="28" width="1328" height="330" rx="14" fill="#020617" fill-opacity="0.52" stroke="#38bdf8" stroke-opacity="0.28"/>
  <rect x="52" y="48" width="340" height="34" rx="8" fill="#0b1221" stroke="#22d3ee" stroke-opacity="0.5"/>
  <text x="68" y="71" fill="#bff6ff" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="700">SOBRE DINAMICO</text>
  <line x1="52" y1="92" x2="1348" y2="92" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.8"/>
  <text x="54" y="118" fill="#d9f4ff" font-family="JetBrains Mono, Consolas, monospace" font-size="23" font-weight="600">Kaiky Brito é um desenvolvedor com foco em tecnologias back-end, especializado no</text>
<text x="54" y="152" fill="#d9f4ff" font-family="JetBrains Mono, Consolas, monospace" font-size="23" font-weight="600">ecossistema Node.js e no uso de linguagens como TypeScript, JavaScript e Python. Sua prática</text>
<text x="54" y="186" fill="#d9f4ff" font-family="JetBrains Mono, Consolas, monospace" font-size="23" font-weight="600">profissional envolve a construção de APIs com Express e a manipulação de bancos de dados</text>
<text x="54" y="220" fill="#d9f4ff" font-family="JetBrains Mono, Consolas, monospace" font-size="23" font-weight="600">MySQL, priorizando a qualidade de código através de ferramentas de linting e formatação.</text>
<text x="54" y="254" fill="#d9f4ff" font-family="JetBrains Mono, Consolas, monospace" font-size="23" font-weight="600">Atualmente, contribui para a organização Omnizap System e mantém o desenvolvimento de</text>
<text x="54" y="288" fill="#d9f4ff" font-family="JetBrains Mono, Consolas, monospace" font-size="23" font-weight="600">projetos ativos como o zyra, consolidando sua presença técnica em repositórios de integração...</text>
  <line x1="52" y1="342" x2="1348" y2="342" stroke="#38bdf8" stroke-opacity="0.32"/>
  <text x="54" y="366" fill="#a8d9f4" font-family="JetBrains Mono, Consolas, monospace" font-size="16">
    atualizado: 59m
  </text>
</svg>