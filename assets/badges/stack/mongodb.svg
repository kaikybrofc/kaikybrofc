    </rect>
    <rect x="-120" y="0" width="120" height="32" fill="url(#scan)">
      <animate attributeName="x" dur="3.6s" repeatCount="indefinite" values="-120;166"/>
    </rect>
  </g>
  <line x1="66" y1="4" x2="66" y2="28" stroke="#94a3b8" stroke-opacity="0.45"/>
  <line x1="66" y1="16" x2="136" y2="16" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2" filter="url(#glow)">
    <animate attributeName="opacity" dur="1.8s" repeatCount="indefinite" values="0.25;0.9;0.25"/>
  </line>
  <rect x="72" y="7" width="18" height="18" rx="4" fill="#020617" fill-opacity="0.36" stroke="#ffffff" stroke-opacity="0.2"/>
