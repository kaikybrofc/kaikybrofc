<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stack: MongoDB" width="166" height="32" viewBox="0 0 166 32">
  <defs>
    <linearGradient id="bgLabel" x1="0" y1="0" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0f1a"/>
      <stop offset="1" stop-color="#0b0f1a"/>
    </linearGradient>
    <linearGradient id="bgMessage" x1="0" y1="0" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#47a248"/>
      <stop offset="1" stop-color="#47a248"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="capsule">
      <rect width="166" height="32" rx="8" ry="8"/>
    </clipPath>
    <filter id="glow" x="-30%" y="-200%" width="160%" height="500%">
